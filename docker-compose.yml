services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: familyquest
      POSTGRES_USER: familyquest
      POSTGRES_PASSWORD: familyquest
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyquest -d familyquest"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://familyquest:familyquest@postgres:5432/familyquest?sslmode=disable
      HTTP_ADDR: :8081
      CORS_ORIGIN: http://localhost:8088
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "8088:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
